# Render Blueprint — TechSphere AI backend
# Deploy bằng cách: Render Dashboard → New → Blueprint → trỏ tới repo này.
#
# Free tier KHÔNG hỗ trợ preDeployCommand → chạy migrate + seed ngay trong
# startCommand. `app.seed` idempotent (check tồn tại theo slug/email) nên chạy
# lại mỗi lần restart không tạo dữ liệu trùng.
#
# Khi nâng lên plan trả phí: bỏ `alembic upgrade head && python -m app.seed` khỏi
# startCommand, chuyển sang `preDeployCommand` (chạy 1 lần/deploy, cold-start nhanh hơn).
services:
  - type: web
    name: techsphere-ai
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # Các secret/biến còn lại (DATABASE_URL, SECRET_KEY, CORS_ORIGINS, REDIS_URL,
      # ADMIN_*, VNPAY_*, CLOUDINARY_*, ...) cấu hình trong Dashboard — xem docs/DEPLOYMENT.md
