# Render Blueprint — TechSphere AI backend
# Deploy bằng cách: Render Dashboard → New → Blueprint → trỏ tới repo này.
# Migration chạy ở preDeployCommand: tự động `alembic upgrade head` mỗi lần deploy,
# sau build và trước khi instance nhận traffic (tránh race khi scale nhiều instance).
services:
  - type: web
    name: techsphere-ai
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # Các secret/biến còn lại (DATABASE_URL, SECRET_KEY, CORS_ORIGINS, REDIS_URL,
      # ADMIN_*, VNPAY_*, CLOUDINARY_*, ...) cấu hình trong Dashboard — xem docs/DEPLOYMENT.md
